xt fill="#ff6b6b" font-family="Arial" font-size="12" x="50" y="370">2 levels → log₂(2) = 1.0 bit</text><text fill="#51cf66" font-family="Arial" font-size="12" x="50" y="387">8 levels → log₂(8) = 3.0 bits</text><text fill="#339af0" font-family="Arial" font-size="12" x="350" y="370">100 levels → log₂(100) ≈ 6.644 bits</text><text fill="#cc5ce0" font-family="Arial" font-size="12" x="350" y="387">1024 levels → log₂(1024) = 10 bits</text><rect fill="#1a1510" height="75" rx="6" stroke="#ffa94d" stroke-width="1" width="640" x="30" y="415" /><text fill="#ffa94d" font-family="Arial" font-size="13" font-weight="bold" x="50" y="440">⚠️ ทำไมไม่เพิ่ม level ให้มากกว่า 100?</text><text fill="#ccc" font-family="Arial" font-size="11" x="50" y="460">• ยิ่งเยอะ level → แต่ละ level ใกล้กันมาก → อ่านสับสน (noise)</text><text fill="#ccc" font-family="Arial" font-size="11" x="50" y="478">• ต้องการ laser ควบคุมแม่นยำมาก + detector ละเอียดมาก</text></svg>