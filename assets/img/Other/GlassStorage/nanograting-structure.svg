<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="400px" version="1.1" width="700px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#0d1117" height="100%" rx="8" width="100%" x="0" y="0" /><text fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" x="350" y="35">Nanograting: โครงสร้างนาโนที่เก็บข้อมูลใน Voxel</text><text fill="#88ccff" font-family="Arial" font-size="13" x="30" y="70">ตัดขวาง (Cross-section):</text><rect fill="#1a2744" height="200" rx="4" stroke="#4a9eff" stroke-width="1" width="250" x="50" y="80" /><text fill="#6688aa" font-family="Arial" font-size="10" text-anchor="middle" x="175" y="295">Glass (Fused Silica)</text><rect fill="#66bbff" height="4" opacity="0.5" width="190" x="80" y="100" /><rect fill="#66bbff" height="4" opacity="0.65" width="190" x="80" y="120" /><rect fill="#66bbff" height="4" opacity="0.8" width="190" x="80" y="140" /><rect fill="#66bbff" height="4" opacity="0.5" width="190" x="80" y="160" /><rect fill="#66bbff" height="4" opacity="0.65" width="190" x="80" y="180" /><rect fill="#66bbff" height="4" opacity="0.8" width="190" x="80" y="200" /><rect fill="#66bbff" height="4" opacity="0.5" width="190" x="80" y="220" /><rect fill="#66bbff" height="4" opacity="0.65" width="190" x="80" y="240" /><text fill="#66bbff" font-family="Arial" font-size="10" x="280" y="150">← Nanograting</text><text fill="#5588aa" font-family="Arial" font-size="10" x="280" y="168">(แผ่นบาง ~20nm เรียงห่าง ~100-200nm)</text><line stroke="#ffcc00" stroke-width="3" x1="100" x2="100" y1="60" y2="95" /><polygon fill="#ffcc00" points="96,95 104,95 100,105" /><text fill="#ffcc00" font-family="Arial" font-size="10" text-anchor="middle" x="100" y="55">แสงเข้า</text><text fill="#ffcc00" font-family="Arial" font-size="10" x="140" y="300">แสงออก:</text><line stroke="#ff6b6b" stroke-width="2" x1="130" x2="130" y1="310" y2="330" /><text fill="#ff6b6b" font-family="Arial" font-size="9" x="140" y="325">ช้า (slow) → retardance</text><line stroke="#51cf66" stroke-width="2" x1="250" x2="250" y1="310" y2="330" /><text fill="#51cf66" font-family="Arial" font-size="9" x="260" y="325">เร็ว (fast)</text><text fill="#88ccff" font-family="Arial" font-size="13" x="400" y="70">มุมมองจากด้านบน:</text><rect fill="#111827" height="90" rx="6" stroke="#ff6b6b" stroke-width="1.5" width="120" x="420" y="100" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="456.0" x2="456.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="464.0" x2="464.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="472.0" x2="472.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="480.0" x2="480.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="488.0" x2="488.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="496.0" x2="496.0" y1="155.0" y2="125.0" /><line opacity="0.7" stroke="#ff6b6b" stroke-width="1.5" x1="504.0" x2="504.0" y1="155.0" y2="125.0" /><text fill="#ff6b6b" font-family="Arial" font-size="11" text-anchor="middle" x="480" y="175">θ = 0°</text><text fill="#888" font-family="Arial" font-size="9" text-anchor="middle" x="480" y="188">data = 0</text><rect fill="#111827" height="90" rx="6" stroke="#51cf66" stroke-width="1.5" width="120" x="560" y="100" /><line opacity="0.7" stroke="#51cf66" stroke-width="1.5" x1="592.4228355337247" x2="613.636038969321" y1="133.63603896932108" y2="112.42283553372465" /><line opacity="0.7" stroke="#51cf66" stroke-width="1.5" x1="598.0796897832171" x2="619.2928932188134" y1="139.29289321881345" y2="118.07968978321702" /><line opacity="0.7" stroke="#51cf66" stroke-width="1.5" x1="603.7365440327094" x2="624.9497474683058" y1="144.94974746830584" y2="123.73654403270942" /><line opacity="0.7" stroke="#51cf66" stroke-width="1.5" x1="609.3933982822018" x2