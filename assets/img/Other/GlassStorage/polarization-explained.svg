<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="350px" version="1.1" width="700px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#0d1117" height="100%" rx="8" width="100%" x="0" y="0" /><text fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" x="350" y="35">Polarization (โพลาไรเซชัน) — ทิศทางที่แสงสั่น</text><text fill="#ffcc00" font-family="Arial" font-size="13" text-anchor="middle" x="120" y="70">แสงปกติ (Unpolarized)</text><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="155.0" y1="130" y2="130.0" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="150.31088913245534" y1="130" y2="147.5" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="137.5" y1="130" y2="160.31088913245534" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="120.0" y1="130" y2="165.0" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="102.5" y1="130" y2="160.31088913245534" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="89.68911086754464" y1="130" y2="147.5" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="85.0" y1="130" y2="130.0" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="89.68911086754466" y1="130" y2="112.5" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="102.49999999999999" y1="130" y2="99.68911086754466" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="120.0" y1="130" y2="95.0" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="137.5" y1="130" y2="99.68911086754466" /><line opacity="0.6" stroke="#ffcc00" stroke-width="1.5" x1="120" x2="150.31088913245534" y1="130" y2="112.49999999999999" /><circle cx="120" cy="130" fill="#ffcc00" r="3" /><text fill="#999" font-family="Arial" font-size="10" text-anchor="middle" x="120" y="185">สั่นทุกทิศ</text><text fill="#ff6b6b" font-family="Arial" font-size="13" text-anchor="middle" x="280" y="70">แนวตั้ง (0°)</text><line stroke="#ff6b6b" stroke-width="3" x1="280" x2="280" y1="90" y2="170" /><circle cx="280" cy="130" fill="#ff6b6b" r="3" /><text fill="#999" font-family="Arial" font-size="10" text-anchor="middle" x="280" y="185">สั่นขึ้น-ลง</text><text fill="#51cf66" font-family="Arial" font-size="13" text-anchor="middle" x="440" y="70">แนวนอน (90°)</text><line stroke="#51cf66" stroke-width="3" x1="400" x2="480" y1="130" y2="130" /><circle cx="440" cy="130" fill="#51cf66" r="3" /><text fill="#999" font-family="Arial" font-size="10" text-anchor="middle" x="440" y="185">สั่นซ้าย-ขวา</text><text fill="#339af0" font-family="Arial" font-size="13" text-anchor="middle" x="600" y="70">ทแยง (45°)</text><line stroke="#339af0" stroke-width="3" x1="575.2512626584709" x2="624.7487373415291" y1="105.25126265847084" y2="154.74873734152916" /><circle cx="600" cy="130" fill="#339af0" r="3" /><text fill="#999" font-family="Arial" font-size="10" text-anchor="middle" x="600" y="185">สั่นเอียง</text><rect fill="#111827" height="130" rx="6" stroke="#339af0" stroke-width="1" width="640" x="30" y="210" /><text fill="white" font-family="Arial" font-size="14" font-weight="bold" x="50" y="235">🎯 Voxel ใช้ Polarization เก็บข้อมูลยังไง?</text><text fill="#ccc" font-family="Arial" font-size="11" x="50" y="260">1. เลเซอร์ยิงด้วยมุม polarization ต่างกัน → สร้าง nanograting ที่หมุนต่างมุมในแก้ว</text><text fill="#ccc" font-family="Arial" font-size="11" x="50" y="278">2. ส่องแสงอ่าน → แสงถูกหมุนตามมุม nanograting → วัดมุมที่ออกมา = รู้ข้อมูล</text><text fill="#ccc" font-family="Arial" font-size="11" x="50" y="296">3. ยิ่งแบ่งมุมละเอียด → level เยอะ → bits เยอะ</text><text fill="#88aacc" font-family="Arial" font-size="11" x="50" y="314">   เช่น 8 มุม (0°,45°,90°,...,315°) = 3 bits  |  100 มุม ≈ 6.6 bits</text></svg>