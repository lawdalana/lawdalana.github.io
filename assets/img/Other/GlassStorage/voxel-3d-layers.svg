th="1" /><text fill="white" font-family="Arial" font-size="8" text-anchor="middle" x="240" y="264">V3</text><text fill="#51cf66" font-family="Arial" font-size="11" x="315" y="260">Layer 2 (z=1)</text><line stroke="#2a3a55" stroke-dasharray="4,4" stroke-width="1" x1="100" x2="300" y1="310" y2="310" /><circle cx="140" cy="340" fill="#339af0" opacity="0.8" r="10" stroke="white" stroke-width="1" /><text fill="white" font-family="Arial" font-size="8" text-anchor="middle" x="140" y="344">V1</text><circle cx="190" cy="340" fill="#339af0" opacity="0.8" r="10" stroke="white" stroke-width="1" /><text fill="white" font-family="Arial" font-size="8" text-anchor="middle" x="190" y="344">V2</text><circle cx="240" cy="340" fill="#339af0" opacity="0.8" r="10" stroke="white" stroke-width="1" /><text fill="white" font-family="Arial" font-size="8" text-anchor="middle" x="240" y="344">V3</text><text fill="#339af0" font-family="Arial" font-size="11" x="315" y="340">Layer 1 (z=0)</text><line opacity="0.8" stroke="#ff4444" stroke-width="3" x1="190" x2="190" y1="55" y2="145" /><polygon fill="#ff4444" opacity="0.8" points="185,145 195,145 190,160" /><text fill="#ff6b6b" font-family="Arial" font-size="12" text-anchor="middle" x="190" y="50">Femtosecond Laser</text><text fill="#88ccff" font-family="Arial" font-size="12" text-anchor="middle" x="200" y="440">📖 อ่าน: ส่องแสงผ่าน → วัดสมบัติทางแสง</text><text fill="white" font-family="Arial" font-size="14" font-weight="bold" x="400" y="100">แต่ละ Voxel เก็บ:</text><rect fill="#1a2744" height="45" rx="6" stroke="#ff6b6b" stroke-width="1.5" width="250" x="400" y="140" /><text fill="#ff6b6b" font-family="Arial" font-size="12" x="415" y="160">🔴 Polarization</text><text fill="#aaa" font-family="Arial" font-size="10" x="415" y="176">มุมสั่นของแสง</text><rect fill="#1a2744" height="45" rx="6" stroke="#51cf66" stroke-width="1.5" width="250" x="400" y="200" /><text fill="#51cf66" font-family="Arial" font-size="12" x="415" y="220">🟢 Retardance</text><text fill="#aaa" font-family="Arial" font-size="10" x="415" y="236">ความหน่วงแสง</text><rect fill="#1a2744" height="45" rx="6" stroke="#339af0" stroke-width="1.5" width="250" x="400" y="260" /><text fill="#339af0" font-family="Arial" font-size="12" x="415" y="280">🔵 Refractive Index</text><text fill="#aaa" font-family="Arial" font-size="10" x="415" y="296">ดัชนีหักเห</text></svg>